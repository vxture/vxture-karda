name: deploy

# Tag-triggered production deploy. A v*.*.* tag builds the image and deploys the
# production stack on worker-02 (tailnet, non-VPC -> GHCR primary with ACR
# fallback), stack root /srv/md0/karda, published port 3233. The production
# GitHub Environment carries a required-reviewer gate, so the deploy job pauses
# until approved.
#
# BETA TIER PENDING (140-repo-governance-standard.md section 4): beta + production
# is the standard two-tier model for every vxture product and karda follows it.
# Only the beta half is dormant: during the development phase everything deploys
# straight to production, and beta is a reserved release channel awaiting its own
# separate server. Tracked as TD-001 in docs/60-operations/10-tech-debt.md.
#
# Add the beta-* trigger and routing branch ONLY when that server exists - a tag
# prefix with no environment behind it deploys nothing and fails confusingly. The
# beta half also needs stack_root/deploy_dir below to become env-aware; they are
# hardcoded to the production paths today.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      explicit_environment:
        description: "Debug override (production only)."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - production

# Serialize per target environment (production), never per tag. An in-flight
# deploy is not cancelled.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  # Product code: the `karda` literal baked in at instantiation. Leave the
  # PRODUCT_CODE repo variable UNSET here - it is the template's demo escape
  # hatch, and setting it would repoint the stack root, containers, and DB.
  PRODUCT_CODE: ${{ vars.PRODUCT_CODE || 'karda' }}

jobs:
  detect:
    name: detect-target-environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.route.outputs.environment }}
    steps:
      - name: Route tag to GitHub Environment
        id: route
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            v*.*.*) environment=production ;;
            *) echo "deploy.yml triggered on unsupported tag: $TAG" >&2; exit 1 ;;
          esac
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "route: tag=$TAG -> environment=$environment"

  call-build:
    name: docker-build
    uses: ./.github/workflows/build.yml
    needs: detect
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      pass_sha: ${{ github.sha }}
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
      ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [detect, call-build]
    permissions:
      contents: read
      packages: read
      issues: write
    environment:
      name: ${{ needs.detect.outputs.environment }}
    steps:
      - name: Checkout deploy sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$ALIYUN_ACR_REGISTRY"
          test -n "$ALIYUN_ACR_NAMESPACE"
          test -n "$TAILSCALE_OAUTH_CLIENT_ID"
          test -n "$TAILSCALE_OAUTH_CLIENT_SECRET"

          # DEPLOY_DIR must be an absolute POSIX path. Setting it from Git Bash
          # on Windows silently rewrites a leading "/" into the MSYS install
          # prefix (a Windows drive path), and the remote deploy.sh then derives
          # ROOT from it and looks for the stack in a directory that does not
          # exist. That cost a full build + approval + SSH round trip to surface
          # as "missing <root>/etc/.env" on 2026-07-23. Assert the shape here so
          # it fails in seconds instead. Set the secret from PowerShell, the
          # GitHub UI, or Git Bash with MSYS_NO_PATHCONV=1.
          # Empty is allowed: the deploy step falls back to /srv/md0/<code>/deploy.
          if [ -n "${DEPLOY_DIR:-}" ]; then
            case "$DEPLOY_DIR" in
              /*) ;;
              *) echo "::error::DEPLOY_DIR must be an absolute POSIX path (starts with '/'). It looks path-converted - see the comment in deploy.yml." >&2; exit 1 ;;
            esac
            case "$DEPLOY_DIR" in
              *:*|*"Program Files"*) echo "::error::DEPLOY_DIR contains a Windows path fragment - it was mangled by MSYS path conversion." >&2; exit 1 ;;
            esac
          fi

      - name: Join tailnet and prepare SSH
        uses: ./.github/actions/tailnet-ssh-connect
        with:
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-tag: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-port: ${{ secrets.DEPLOY_PORT }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy-ssh-passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          deploy-known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Bootstrap .env on target host
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          ENV_FILE_B64: ${{ secrets.ENV_FILE_BASE64 }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          stack_root="/srv/md0/${PRODUCT_CODE}"
          ssh_opts=(-i ~/.ssh/deploy_key -p "$port" -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30)
          if ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "test -f '$stack_root/etc/.env'"; then
            echo "[bootstrap] $stack_root/etc/.env exists - skipping"
          else
            ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$stack_root/etc'"
            printf '%s' "$ENV_FILE_B64" | ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
              "base64 -d > '$stack_root/etc/.env' && chmod 600 '$stack_root/etc/.env'"
            echo "[bootstrap] .env created"
          fi

      - name: Deploy over SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          PASSED_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ needs.call-build.outputs.image_tag }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          deploy_dir="${DEPLOY_DIR:-/srv/md0/${PRODUCT_CODE}/deploy}"
          image_tag="$IMAGE_TAG"
          test -n "$image_tag"
          ssh_opts=(-i ~/.ssh/deploy_key -p "$port" -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30)

          # Push only the deploy subset (deploy/, configs/, docker-compose.yml)
          # via one staged --delete rsync; the operator .env lives at
          # <root>/etc/.env, outside the rsync target, so --delete is safe.
          ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$deploy_dir'"
          stage="$(mktemp -d)"
          cp -a deploy/. "$stage/"
          [ -d configs ] && cp -a configs "$stage/configs" || true
          cp -a docker-compose.yml "$stage/docker-compose.yml"
          rsync -az --delete --exclude='VERSION' --exclude='data' \
            -e "ssh -i ~/.ssh/deploy_key -p $port -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30" \
            "$stage/" "$DEPLOY_USER@$DEPLOY_HOST:$deploy_dir/"
          rm -rf "$stage"

          # Confirm the delivered compose carries a db service - catches a stale
          # or truncated compose being rsync'd before we start the stack.
          #
          # Grep the container_name TEMPLATE, not the resolved name. The file
          # says `container_name: ${PROJECT_NAME:-karda}-db`, so the literal
          # "karda-db" never appears in it and the previous check
          # (grep '${PRODUCT_CODE}-db') could never match: it warned on every
          # deploy, which is worse than having no check at all - a guard that
          # always fires trains everyone to ignore it. It also only warned, so
          # a genuinely missing db service would not have stopped the deploy.
          ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "grep -qE 'container_name:.*-db$' '$deploy_dir/docker-compose.yml' && echo '[deliver] compose declares a db service' || { echo '[deliver] ERROR: delivered compose has no db service' >&2; exit 1; }"
          ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "printf '%s\n' '$PASSED_SHA' > '$deploy_dir/VERSION'"

          # Remote deploy script: GHCR primary (non-VPC host), ACR fallback.
          cat > /tmp/deploy.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd "$REPO_DIR"
          export IMAGE_REGISTRY="ghcr.io"
          export IMAGE_NAMESPACE="vxture"
          export IMAGE_TAG="$IMAGE_TAG"
          export FALLBACK_IMAGE_REGISTRY="$ALIYUN_ACR_REGISTRY"
          export FALLBACK_IMAGE_NAMESPACE="$ALIYUN_ACR_NAMESPACE"
          if [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi
          if [ -n "${ALIYUN_ACR_USERNAME:-}" ] && [ -n "${ALIYUN_ACR_PASSWORD:-}" ]; then
            for attempt in 1 2 3 4 5; do
              printf '%s' "$ALIYUN_ACR_PASSWORD" | timeout 45 docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin && break || sleep $((attempt * 5))
            done
          fi
          bash deploy.sh all
          bash deploy.sh verify
          REMOTE_SCRIPT
          scp -i ~/.ssh/deploy_key -P "$port" -o ConnectTimeout=30 /tmp/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy.sh"

          remote_env=(
            "PRODUCT_CODE=$PRODUCT_CODE" "REPO_DIR=$deploy_dir" "IMAGE_TAG=$image_tag"
            "ALIYUN_ACR_REGISTRY=$ALIYUN_ACR_REGISTRY" "ALIYUN_ACR_NAMESPACE=$ALIYUN_ACR_NAMESPACE"
            "ALIYUN_ACR_USERNAME=$ALIYUN_ACR_USERNAME" "ALIYUN_ACR_PASSWORD=$ALIYUN_ACR_PASSWORD"
            "GHCR_USERNAME=$GHCR_USERNAME" "GHCR_TOKEN=$GHCR_TOKEN"
          )
          remote_cmd=""
          for item in "${remote_env[@]}"; do
            key="${item%%=*}"; value="${item#*=}"
            printf -v escaped '%q=%q ' "$key" "$value"
            remote_cmd+="$escaped"
          done
          remote_cmd+="bash /tmp/deploy.sh"
          # Pipe over stdin (not argv) so secrets never appear in the host's ps/proc.
          printf '%s\n' "$remote_cmd" | ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" bash -s

      - name: Notify on deploy failure (open/update issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.detect.outputs.environment }}';
            const title = `Deploy failure: ${env}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const tag = context.ref.replace('refs/tags/', '');
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'deploy-failure' });
            const existing = issues.find((i) => i.title === title);
            const body = `Deploy to **${env}** failed for \`${context.sha.substring(0,7)}\` (tag \`${tag}\`).\n\nRun: ${runUrl}`;
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['deploy-failure'] });
            }

      - name: Close deploy-failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.detect.outputs.environment }}';
            const title = `Deploy failure: ${env}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'deploy-failure' });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed' });
            }
